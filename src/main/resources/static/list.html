<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lista de alumnos del sistema de gestión">
    <title>Lista de Alumnos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <h1>Gestión de Alumnos</h1>
        <nav>
            <a href="/">Inicio</a>
            <a href="/alumnos/create">Agregar Nuevo Alumno</a>
        </nav>
    </header>

    <main>
        <h2>Lista de Alumnos</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Apellido</th>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Teléfono</th>
                    <th>Dirección</th>
                    <th>Programa</th>
                    <th>Activo</th>
                    <th>Promedio</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="alumno : ${alumnos}">
                    <td th:text="${alumno.id}"></td>
                    <td th:text="${alumno.lastName}"></td>
                    <td th:text="${alumno.name}"></td>
                    <td th:text="${alumno.email}"></td>
                    <td th:text="${alumno.phoneNumber}"></td>
                    <td th:text="${alumno.address}"></td>
                    <td th:text="${alumno.program}"></td>
                    <td th:text="${alumno.active ? 'Sí' : 'No'}"></td>
                    <td th:text="${alumno.average}"></td>
                    <td>
                        <a th:href="@{'/alumnos/edit/' + ${alumno.id}}">Editar</a> |
                        <a th:href="@{'/alumnos/delete/' + ${alumno.id}}" onclick="return confirm('¿Estás seguro de que deseas eliminar este alumno?');">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>

    <footer>
        <p>&copy; 2024 Gestión de Alumnos. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
